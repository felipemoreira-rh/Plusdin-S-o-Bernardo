<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plusdin São Bernardo — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--orange:#F97316;--orange-light:#FFF7ED;--orange-dark:#EA580C;--orange-deep:#9A3412;--green:#16A34A;--green-light:#F0FDF4;--blue:#2563EB;--blue-light:#EFF6FF;--red:#DC2626;--red-light:#FEF2F2;--yellow:#D97706;--yellow-light:#FFFBEB;--purple:#7C3AED;--purple-light:#F5F3FF;--gray-50:#F9FAFB;--gray-100:#F3F4F6;--gray-200:#E5E7EB;--gray-300:#D1D5DB;--gray-400:#9CA3AF;--gray-500:#6B7280;--gray-600:#4B5563;--gray-700:#374151;--gray-800:#1F2937;--gray-900:#111827;--sidebar-w:240px;--header-h:60px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--gray-50);color:var(--gray-800);min-height:100vh;display:flex}
.sidebar{width:var(--sidebar-w);background:var(--gray-900);min-height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-badge{background:var(--orange);color:white;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:6px}
.sidebar-logo h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;color:white;line-height:1.2}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;font-size:14px;font-weight:500;color:var(--gray-400);transition:0.15s;border-left:3px solid transparent}
.nav-item.active{color:white;background:rgba(249,115,22,0.12);border-left-color:var(--orange)}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
.header{height:var(--header-h);background:white;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 28px;position:sticky;top:0;z-index:50}
.content{padding:28px}
.card{background:white;border-radius:12px;border:1px solid var(--gray-200);padding:20px;margin-bottom:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:16px;margin-bottom:24px}
.btn{padding:10px 18px;border-radius:8px;font-weight:600;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--orange);color:white}
.btn-sm{padding:6px 12px;font-size:12px}
.page{display:none} .page.active{display:block}
input, select{padding:10px;border-radius:8px;border:1px solid var(--gray-200);width:100%}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px;background:var(--gray-50);font-size:11px;color:var(--gray-500)}
td{padding:12px;border-bottom:1px solid var(--gray-100)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:white;border-radius:16px;padding:32px;width:500px}
</style>
</head>
<body>
<div class="sidebar">
    <div class="sidebar-logo"><div class="logo-badge">PLUSDIN</div><h2>São Bernardo</h2></div>
    <nav class="sidebar-nav">
        <div class="nav-item active" onclick="navigate('dashboard', this)">📊 Dashboard</div>
        <div class="nav-item" onclick="navigate('atletas', this)">⚽ Atletas</div>
        <div class="nav-item" onclick="navigate('financeiro', this)">💳 Financeiro</div>
        <div class="nav-item" onclick="navigate('calendario', this)">📅 Calendário</div>
        <div class="nav-item" onclick="navigate('chamadas', this)">✅ Chamadas</div>
    </nav>
</div>

<div class="main">
    <div class="header"><h1 id="page-title">Dashboard</h1></div>
    <div class="content">
        
        <div id="page-dashboard" class="page active">
            <div class="stats-grid">
                <div class="stat-card card"><span>Atletas</span><h2 id="count-atletas">0</h2></div>
                <div class="stat-card card"><span>Receita Mês</span><h2 id="total-financeiro">R$ 0,00</h2></div>
            </div>
        </div>

        <div id="page-atletas" class="page">
            <div class="card">
                <button class="btn btn-primary" onclick="openModal('modal-atleta')" style="margin-bottom:15px">+ Novo Atleta</button>
                <table>
                    <thead><tr><th>Nome</th><th>Categoria</th><th>Ações</th></tr></thead>
                    <tbody id="lista-atletas"></tbody>
                </table>
            </div>
        </div>

        <div id="page-financeiro" class="page">
            <div class="card">
                <h3>Lançar Pagamento</h3><br>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px">
                    <select id="fin-atleta"></select>
                    <input type="number" id="fin-valor" placeholder="Valor R$">
                    <button class="btn btn-primary" onclick="salvarPagamento()">Confirmar</button>
                </div>
                <br>
                <table>
                    <thead><tr><th>Data</th><th>Atleta</th><th>Valor</th></tr></thead>
                    <tbody id="lista-financeiro"></tbody>
                </table>
            </div>
        </div>

        <div id="page-calendario" class="page">
            <div class="card">
                <h3>Agendar Treino/Jogo</h3><br>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px">
                    <input type="date" id="cal-data">
                    <input type="text" id="cal-evento" placeholder="Ex: Treino Tático">
                    <button class="btn btn-primary" onclick="salvarEvento()">Agendar</button>
                </div>
                <br>
                <div id="lista-calendario"></div>
            </div>
        </div>

        <div id="page-chamadas" class="page">
            <div class="card">
                <h3>Chamada do Dia</h3>
                <p>Selecione os atletas presentes:</p><br>
                <div id="lista-chamada-corpo"></div>
                <button class="btn btn-primary" onclick="salvarChamada()" style="margin-top:20px">Salvar Presenças</button>
            </div>
        </div>

    </div>
</div>

<div id="modal-atleta" class="modal-overlay">
    <div class="modal">
        <h3>Cadastrar Atleta</h3><br>
        <input type="text" id="f-nome" placeholder="Nome"><br><br>
        <select id="f-cat"><option>Sub 11</option><option>Sub 13</option><option>Sub 15</option></select><br><br>
        <button class="btn btn-primary" onclick="salvarAtleta()">Salvar</button>
        <button class="btn" onclick="closeModal('modal-atleta')">Fechar</button>
    </div>
</div>
<script>
// BANCO DE DADOS
let db = JSON.parse(localStorage.getItem('plusdin_completo')) || { 
    atletas: [], financeiro: [], eventos: [], chamadas: [] 
};

function save() {
    localStorage.setItem('plusdin_completo', JSON.stringify(db));
    renderAll();
}

function navigate(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    document.getElementById('page-title').innerText = id.toUpperCase();
    if(el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
}

// ATLETAS
function salvarAtleta() {
    const nome = document.getElementById('f-nome').value;
    if(!nome) return;
    db.atletas.push({ id: Date.now(), nome, cat: document.getElementById('f-cat').value });
    save();
    closeModal('modal-atleta');
}

// FINANCEIRO
function salvarPagamento() {
    const valor = document.getElementById('fin-valor').value;
    const atletaId = document.getElementById('fin-atleta').value;
    if(!valor) return;
    db.financeiro.push({ 
        data: new Date().toLocaleDateString(), 
        atleta: db.atletas.find(a => a.id == atletaId).nome, 
        valor: parseFloat(valor) 
    });
    save();
}

// CALENDÁRIO
function salvarEvento() {
    const data = document.getElementById('cal-data').value;
    const desc = document.getElementById('cal-evento').value;
    if(!data || !desc) return;
    db.eventos.push({ data, desc });
    save();
}

// CHAMADAS
function renderAll() {
    // Lista Atletas
    document.getElementById('lista-atletas').innerHTML = db.atletas.map(a => `
        <tr><td>${a.nome}</td><td>${a.cat}</td><td><button onclick="remover(${a.id})" style="color:red">Excluir</button></td></tr>
    `).join('');

    // Select Financeiro
    document.getElementById('fin-atleta').innerHTML = db.atletas.map(a => `<option value="${a.id}">${a.nome}</option>`).join('');

    // Lista Financeiro
    document.getElementById('lista-financeiro').innerHTML = db.financeiro.map(f => `
        <tr><td>${f.data}</td><td>${f.atleta}</td><td>R$ ${f.valor.toFixed(2)}</td></tr>
    `).join('');

    // Dashboard
    document.getElementById('count-atletas').innerText = db.atletas.length;
    const total = db.financeiro.reduce((acc, curr) => acc + curr.valor, 0);
    document.getElementById('total-financeiro').innerText = `R$ ${total.toFixed(2)}`;

    // Lista Calendário
    document.getElementById('lista-calendario').innerHTML = db.eventos.map(e => `
        <div class="card" style="margin-bottom:10px"><b>${e.data}</b> - ${e.desc}</div>
    `).join('');

    // Lista Chamada
    document.getElementById('lista-chamada-corpo').innerHTML = db.atletas.map(a => `
        <div style="padding:10px; border-bottom:1px solid #eee">
            <input type="checkbox"> ${a.nome} (${a.cat})
        </div>
    `).join('');
}

function remover(id) {
    db.atletas = db.atletas.filter(a => a.id !== id);
    save();
}

function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}

// Inicialização
renderAll();
</script>
</body>
</html>
